<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eeeeee;
}

.page {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
}

.mobile-frame {
    width: 100%;
    max-width: 1080px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.logo {
    width: 180px;
    max-width: 45%;
    margin: 30px 0 35px 0;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 30px;
}

input {
    width: 100%;
    padding: 16px;
    margin-bottom: 20px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
    text-transform: uppercase;
}

button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: #202020;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.erro {
    color: red;
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
}

@media (max-width: 600px) {
    .page {
        padding: 20px 14px;
    }

    .mobile-frame {
        max-width: 1080px;
        min-height: 1920px;
    }

    .logo {
        width: 220px;
        margin-top: 40px;
        margin-bottom: 45px;
    }

    .card {
        max-width: 92%;
        padding: 35px 25px;
    }

    h1 {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<div class="page">
    <div class="mobile-frame">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
            alt="Logo Crist Oss"
        >

        <div class="card">

            <h1>LOGIN</h1>

            {% if erro %}
            <div class="erro">
                {{ erro }}
            </div>
            {% endif %}

            <form method="POST">

                <input
                    type="text"
                    name="usuario"
                    placeholder="USUÁRIO"
                    required
                >

                <input
                    type="password"
                    name="senha"
                    placeholder="SENHA"
                    required
                >

                <button type="submit">
                    ENTRAR
                </button>

            </form>

        </div>

    </div>
</div>

</body>
</html>
