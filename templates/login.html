<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f0f0f0;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
}

.card{
    width:350px;
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#202020;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:black;
}

.erro{
    color:red;
    text-align:center;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>LOGIN</h1>

{% if erro %}
<div class="erro">
    {{ erro }}
</div>
{% endif %}

<form method="POST">

<input
    type="text"
    name="usuario"
    placeholder="Usuário"
    required
>

<input
    type="password"
    name="senha"
    placeholder="Senha"
    required
>

<button type="submit">
    ENTRAR
</button>

</form>

</div>

</body>
</html>
