<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>MINHA CONTA</title>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:560px;
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.logo{
    display:block;
    width:140px;
    max-width:45%;
    margin:0 auto 20px auto;
}

.avatar{
    display:block;
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 20px auto;
    border:4px solid #202020;
}

h1{
    text-align:center;
    margin-bottom:25px;
    text-transform:uppercase;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    text-transform:uppercase;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:10px;
    border:1px solid #bbbbbb;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#202020;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    text-transform:uppercase;
}

button:hover{
    background:#000;
}

.erro{
    color:red;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
    text-transform:uppercase;
}

.sucesso{
    color:green;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
    text-transform:uppercase;
}

.voltar{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#555;
    text-decoration:none;
    font-weight:bold;
    text-transform:uppercase;
}

@media(max-width:600px){

    html,
    body{
        height:100%;
        overflow:hidden;
    }

    .container{
        height:100vh;
        padding:10px;
    }

    .card{
        max-width:430px;
        max-height:96vh;
        padding:20px;
    }

    .logo{
        width:100px;
        margin-bottom:12px;
    }

    .avatar{
        width:90px;
        height:90px;
        margin-bottom:14px;
    }

    h1{
        font-size:22px;
        margin-bottom:16px;
    }

    label{
        font-size:13px;
    }

    input{
        padding:10px;
        font-size:14px;
        margin-bottom:12px;
    }

    button{
        padding:12px;
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
            alt="Logo Crist Oss"
        >

        <img
            class="avatar"
            src="{{ url_for('static', filename='uploads/' + usuario.foto) }}"
            alt="Foto do usuário"
        >

        <h1>MINHA CONTA</h1>

        {% if erro %}
            <div class="erro">
                {{ erro }}
            </div>
        {% endif %}

        {% if mensagem %}
            <div class="sucesso">
                {{ mensagem }}
            </div>
        {% endif %}

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <label>FOTO DO USUÁRIO</label>

            <input
                type="file"
                name="foto"
                accept="image/*"
                capture="user"
            >

            <label>NOVO USUÁRIO</label>

            <input
                type="text"
                name="novo_usuario"
                value="{{ usuario.usuario }}"
            >

            <label>NOVA SENHA</label>

            <input
                type="password"
                name="nova_senha"
                placeholder="DEIXE EM BRANCO PARA NÃO ALTERAR"
            >

            <button type="submit">
                SALVAR ALTERAÇÕES
            </button>

        </form>

        <a
            class="voltar"
            href="{{ url_for('menu') }}"
        >
            VOLTAR
        </a>

    </div>
</div>

</body>
</html>
