<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MENU</title>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.topbar{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:10px 20px;
    z-index:10;
}

.user-button{
    display:flex;
    align-items:center;
    gap:10px;
    background:white;
    padding:8px 14px;
    border-radius:40px;
    box-shadow:0 5px 18px rgba(0,0,0,.15);
    text-decoration:none;
    color:#222;
    font-weight:bold;
    text-transform:uppercase;
}

.user-button img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:90px 20px 20px 20px;
}

.card{
    width:100%;
    max-width:520px;
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
}

.logo{
    width:160px;
    max-width:45%;
    margin-bottom:25px;
}

h1{
    font-size:28px;
    margin-bottom:30px;
    text-transform:uppercase;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    height:60px;

    margin-bottom:16px;

    background:#000000;

    color:#FFFFFF;

    text-decoration:none;

    border-radius:14px;

    font-size:20px;
    font-weight:bold;

    text-transform:uppercase;

    transition:.2s;
}

.btn:hover{
    background:#1b1b1b;
}

.admin{
    background:#000000;
    font-size:20px;
}

.sair{
    background:#000000;
    font-size:20px;
}

@media(max-width:600px){

    html,
    body{
        height:100%;
        overflow:hidden;
    }

    .topbar{
        height:58px;
        padding:8px 12px;
    }

    .user-button{
        padding:6px 10px;
        font-size:12px;
    }

    .user-button img{
        width:34px;
        height:34px;
    }

    .container{
        height:100vh;
        padding:70px 12px 12px 12px;
    }

    .card{
        max-width:430px;
        padding:24px;
    }

    .logo{
        width:130px;
        margin-bottom:20px;
    }

    h1{
        font-size:22px;
    }

    .btn{
        font-size:17px;
        padding:15px;
    }

    .admin,
    .sair{
        font-size:14px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <a class="user-button" href="{{ url_for('admin.minha_conta') }}">

        <img
            src="{% if foto and foto.startswith('http') %}{{ foto }}{% else %}{{ url_for('static', filename='uploads/' + (foto or 'default.png')) }}{% endif %}"
            alt="Foto do usuário"
        >

        <span>{{ usuario }}</span>

    </a>
</div>

<div class="container">
    <div class="card">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
            alt="Logo Crist Oss"
        >

        <h1>GRADUAÇÃO CRIST OSS BJJ</h1>

        <a class="btn" href="{{ url_for('certificado') }}">
            CERTIFICADO
        </a>

        <a class="btn" href="{{ url_for('declaracao_menu') }}">
            DECLARAÇÃO
        </a>

        <a class="btn" href="{{ url_for('alunos.alunos') }}">
            👨‍🎓 ALUNOS
        </a>

        <a class="btn" href="{{ url_for('presencas.presencas') }}">
            PRESENÇAS
        </a>
        
        {% if tipo == "admin" %}
        <a class="btn admin" href="{{ url_for('admin.admin') }}">
            GERENCIAR USUÁRIOS
        </a>
        {% endif %}

        <a class="btn sair" href="{{ url_for('login.logout') }}">
            SAIR
        </a>

    </div>
</div>

</body>
</html>
