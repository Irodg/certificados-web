<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>ALTERAR LOGIN</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:520px;
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.logo{
    display:block;
    width:140px;
    margin:0 auto 25px auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
    text-transform:uppercase;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:10px;
    border:1px solid #bbbbbb;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#202020;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#000;
}

.erro{
    color:red;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.sucesso{
    color:green;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.voltar{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#555;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:600px){

    html,
    body{
        height:100%;
        overflow:hidden;
    }

    .container{
        height:100vh;
        padding:10px;
    }

    .card{
        max-width:430px;
        padding:20px;
    }

    .logo{
        width:110px;
    }

    h1{
        font-size:22px;
    }

    input{
        padding:10px;
        font-size:14px;
    }

    button{
        padding:12px;
        font-size:15px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
        >

        <h1>ALTERAR LOGIN</h1>

        {% if erro %}
            <div class="erro">
                {{ erro }}
            </div>
        {% endif %}

        {% if sucesso %}
            <div class="sucesso">
                {{ sucesso }}
            </div>
        {% endif %}

        <form method="POST">

            <label>NOVO USUÁRIO</label>

            <input
                type="text"
                name="novo_usuario"
                required
            >

            <label>NOVA SENHA</label>

            <input
                type="password"
                name="nova_senha"
                required
            >

            <label>CHAVE MESTRA</label>

            <input
                type="password"
                name="chave_mestra"
                required
            >

            <button type="submit">
                ALTERAR LOGIN
            </button>

        </form>

        <a
            class="voltar"
            href="{{ url_for('menu') }}"
        >
            VOLTAR
        </a>

    </div>
</div>

</body>
</html>
