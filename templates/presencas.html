<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FICHA DE PRESENÇA</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.container{
    min-height:100vh;
    padding:25px 15px;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.logo{
    display:block;
    width:130px;
    margin:0 auto 20px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.data{
    text-align:center;
    font-weight:bold;
    margin-bottom:25px;
}

.aluno{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:10px;
    background:#fafafa;
}

.aluno input{
    width:24px;
    height:24px;
}

.nome{
    font-weight:bold;
    text-transform:uppercase;
}

.info{
    color:#666;
    font-size:13px;
    text-transform:uppercase;
}

.btn{
    width:100%;
    height:56px;
    margin-top:16px;
    border:none;
    border-radius:14px;
    background:#000;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<img
    class="logo"
    src="{{ url_for('static', filename='logo_crist_oss.png') }}"
    alt="Logo Crist Oss"
>

<h1>FICHA DE PRESENÇA</h1>

<div class="data">
    DATA: {{ data_treino.strftime('%d/%m/%Y') }} — AULA 18:00
</div>

<form method="POST" action="#">

{% for aluno in alunos %}
<div class="aluno">
    <input
        type="checkbox"
        name="alunos_presentes"
        value="{{ aluno[0] }}"
    >

    <div>
        <div class="nome">{{ aluno[1] }}</div>
        <div class="info">
            FAIXA: {{ aluno[2] or 'NÃO INFORMADA' }} |
            GRAUS: {{ aluno[3] or '0' }} |
            SEDE: {{ aluno[4] or 'NÃO INFORMADA' }}
        </div>
    </div>
</div>
{% endfor %}

<button class="btn" type="submit">
    SALVAR PRESENÇA
</button>

</form>

<a class="btn" href="{{ url_for('login.menu') }}">
    VOLTAR
</a>

</div>
</div>

</body>
</html>
