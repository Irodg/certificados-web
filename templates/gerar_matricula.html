<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GERAR MATRÍCULA</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:520px;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
}

h1{
    font-size:24px;
}

label{
    display:block;
    text-align:left;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:15px;
    font-size:17px;
    border:1px solid #bbb;
    border-radius:12px;
    box-sizing:border-box;
}

.codigo{
    font-size:34px;
    font-weight:bold;
    letter-spacing:3px;
    margin:25px 0 10px;
}

.info{
    font-size:15px;
    color:#333;
    margin-bottom:20px;
    line-height:1.5;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:56px;
    margin-top:14px;
    background:#000;
    color:white;
    border:0;
    border-radius:14px;
    font-size:17px;
    font-weight:bold;
    text-decoration:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>GERAR CÓDIGO DE MATRÍCULA</h1>

<form method="POST">

    <label>WHATSAPP DO INTERESSADO</label>
    <input
        type="text"
        name="whatsapp"
        placeholder="85999999999"
        value="{{ whatsapp or '' }}"
        inputmode="numeric"
    >

    <button class="btn" type="submit">
        GERAR CÓDIGO
    </button>

</form>

{% if codigo %}

    <div class="codigo">{{ codigo }}</div>

    <div class="info">
        Código válido por 24 horas.<br>
        Expira em: {{ expira_em.strftime('%d/%m/%Y %H:%M') }}
    </div>

    <div class="info">
        Link público:<br>
        {{ request.url_root }}matricula
    </div>

    {% if link_whatsapp %}
    <a class="btn" href="{{ link_whatsapp }}" target="_blank">
        ENVIAR PELO WHATSAPP
    </a>
    {% endif %}

{% endif %}

<a class="btn" href="{{ url_for('menu_matriculas') }}">
    VOLTAR
</a>

</div>
</div>

</body>
</html>
