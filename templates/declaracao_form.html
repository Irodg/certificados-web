<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ titulo }}</title>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eeeeee;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:720px;
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.logo{
    display:block;
    width:150px;
    max-width:45%;
    margin:0 auto 25px auto;
}

h1{
    text-align:center;
    font-size:26px;
    margin-bottom:28px;
    text-transform:uppercase;
}

label{
    display:block;
    font-size:16px;
    font-weight:bold;
    margin-bottom:6px;
    text-transform:uppercase;
}

input,
select{
    width:100%;
    font-size:17px;
    padding:13px;
    margin-bottom:18px;
    border:1px solid #bbbbbb;
    border-radius:10px;
    text-transform:uppercase;
}

.data{
    display:grid;
    grid-template-columns:1fr 2fr 1fr;
    gap:12px;
}

button{
    width:100%;
    background:#202020;
    color:white;
    border:none;
    padding:17px;
    font-size:19px;
    font-weight:bold;
    border-radius:12px;
    cursor:pointer;
    text-transform:uppercase;
}

button:hover{
    background:#000;
}

.voltar{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#555;
    text-decoration:none;
    font-weight:bold;
    text-transform:uppercase;
}

@media(max-width:600px){

    html,
    body{
        height:100%;
        overflow:hidden;
    }

    .container{
        height:100vh;
        padding:10px;
    }

    .card{
        max-width:430px;
        max-height:96vh;
        padding:18px;
        overflow:visible;
    }

    .logo{
        width:110px;
        margin-bottom:12px;
    }

    h1{
        font-size:19px;
        margin-bottom:15px;
    }

    label{
        font-size:13px;
        margin-bottom:4px;
    }

    input,
    select{
        font-size:14px;
        padding:9px;
        margin-bottom:11px;
    }

    .data{
        grid-template-columns:1fr 1.5fr 1fr;
        gap:7px;
    }

    button{
        font-size:15px;
        padding:11px;
    }

    .voltar{
        font-size:13px;
        margin-top:11px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
        >

        <h1>{{ titulo }}</h1>

        <form
            action="{{ url_for('declaracao_visualizar') }}"
            method="POST"
        >

            <input
                type="hidden"
                name="tipo"
                value="{{ tipo }}"
            >

            <label>NOME COMPLETO DO ALUNO</label>

            <input
                type="text"
                name="nome_aluno"
                required
            >

            <label>NOME COMPLETO DO RESPONSÁVEL</label>

            <input
                type="text"
                name="nome_responsavel"
                required
            >

            <label>CPF DO RESPONSÁVEL</label>

            <input
                type="text"
                name="cpf_responsavel"
                id="cpf_responsavel"
                placeholder="000.000.000-00"
                maxlength="14"
                required
            >

            <label>NÚMERO DE GRAUS DO PROFESSOR</label>

            <input
                type="text"
                name="graus"
                placeholder="EX: 1"
                required
            >

            <label>DATA</label>

            <div class="data">

                <select name="dia" required>
                    {% for dia in dias %}
                        <option value="{{ dia }}">
                            {{ dia }}
                        </option>
                    {% endfor %}
                </select>

                <select name="mes" required>
                    {% for mes in meses %}
                        <option value="{{ mes }}">
                            {{ mes }}
                        </option>
                    {% endfor %}
                </select>

                <select name="ano" required>
                    {% for ano in anos %}
                        <option value="{{ ano }}">
                            {{ ano }}
                        </option>
                    {% endfor %}
                </select>

            </div>

            <button type="submit">
                GERAR DECLARAÇÃO
            </button>

        </form>

        <a
            class="voltar"
            href="{{ url_for('declaracao_menu') }}"
        >
            VOLTAR
        </a>

    </div>
</div>

<script>
const cpfInput =
    document.getElementById("cpf_responsavel");

cpfInput.addEventListener(
    "input",
    function(e){

        let valor = e.target.value;

        valor = valor.replace(/\D/g, "");

        valor = valor.substring(0, 11);

        if(valor.length > 9){

            valor = valor.replace(
                /^(\d{3})(\d{3})(\d{3})(\d{0,2}).*/,
                "$1.$2.$3-$4"
            );

        }
        else if(valor.length > 6){

            valor = valor.replace(
                /^(\d{3})(\d{3})(\d{0,3}).*/,
                "$1.$2.$3"
            );

        }
        else if(valor.length > 3){

            valor = valor.replace(
                /^(\d{3})(\d{0,3}).*/,
                "$1.$2"
            );

        }

        e.target.value = valor;
    }
);
</script>

</body>
</html>
