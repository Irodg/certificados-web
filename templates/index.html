<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRADUAÇÃO CRIST OSS BJJ</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eeeeee;
}

.container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px;
}

.card {
    width: 100%;
    max-width: 720px;
    background: white;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.logo {
    display: block;
    width: 180px;
    max-width: 45%;
    margin: 30px auto 35px auto;
}

h1 {
    text-align: center;
    margin-bottom: 35px;
    font-size: 32px;
    text-transform: uppercase;
}

label {
    display: block;
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
    text-transform: uppercase;
}

input,
select {
    width: 100%;
    font-size: 18px;
    padding: 14px;
    margin-bottom: 25px;
    border: 1px solid #bbbbbb;
    border-radius: 10px;
    text-transform: uppercase;
}

.faixa-select {
    position: relative;
    width: 100%;
    margin-bottom: 25px;
}

.faixa-atual {
    width: 100%;
    height: 58px;
    border: 1px solid #bbbbbb;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    background: white;
}

.faixa-cor {
    flex: 1;
    height: 100%;
    position: relative;
    overflow: hidden;
}

.faixa-detalhe {
    width: 15%;
    height: 100%;
}

.faixa-seta {
    width: 50px;
    height: 100%;
    text-align: center;
    font-size: 22px;
    background: white;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
}

.faixa-opcoes {
    display: none;
    position: absolute;
    z-index: 10;
    width: 100%;
    background: white;
    border: 1px solid #bbbbbb;
    border-radius: 10px;
    margin-top: 8px;
    padding: 8px;
    max-height: 420px;
    overflow-y: auto;
}

.faixa-opcao {
    height: 58px;
    display: flex;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 8px;
    border: 1px solid #cccccc;
}

.faixa-opcao:last-child { margin-bottom: 0; }

.faixa-opcao:hover {
    filter: brightness(0.92);
    transform: scale(1.01);
}

.faixa-opcao-cor {
    flex: 1;
    height: 100%;
    position: relative;
    overflow: hidden;
}

.faixa-opcao-detalhe {
    width: 15%;
    height: 100%;
}

.linha-horizontal {
    position: absolute;
    left: 0;
    right: 0;
    top: 40%;
    height: 20%;
}

.data {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 15px;
}

button,
.botao-link {
    width: 100%;
    background: #202020;
    color: white;
    border: none;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    display: block;
    text-align: center;
    text-decoration: none;
}

button:hover,
.botao-link:hover {
    background: #000000;
}

.botao-lote {
    margin-top: 14px;
    background: #444444;
}

.info {
    text-align: center;
    color: #555555;
    margin-top: 20px;
    font-size: 14px;
    text-transform: uppercase;
}

.sair {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #555;
    text-decoration: none;
    text-transform: uppercase;
}

.sair:hover { color: black; }

@media (max-width: 600px) {
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    .container {
        width: 100%;
        height: 100vh;
        min-height: 100vh;
        padding: 10px;
        align-items: center;
    }

    .card {
        width: 100%;
        max-width: 430px;
        max-height: 96vh;
        margin: 0;
        padding: 18px;
        overflow: visible;
        border-radius: 14px;
    }

    .logo {
        width: 120px;
        max-width: 38%;
        margin-top: 0;
        margin-bottom: 14px;
    }

    h1 {
        font-size: 20px;
        margin-bottom: 18px;
    }

    label {
        font-size: 14px;
        margin-bottom: 5px;
    }

    input,
    select {
        font-size: 15px;
        padding: 10px;
        margin-bottom: 14px;
        border-radius: 8px;
    }

    .data {
        grid-template-columns: 1fr 1.5fr 1fr;
        gap: 8px;
    }

    .faixa-select { margin-bottom: 14px; }

    .faixa-atual { height: 44px; }

    .faixa-seta {
        width: 42px;
        font-size: 18px;
    }

    .faixa-opcoes {
        max-height: 260px;
        padding: 6px;
        margin-top: 6px;
    }

    .faixa-opcao {
        height: 44px;
        margin-bottom: 6px;
    }

    button,
    .botao-link {
        padding: 12px;
        font-size: 16px;
        border-radius: 10px;
    }

    .info {
        font-size: 11px;
        margin-top: 12px;
    }

    .sair {
        margin-top: 12px;
        font-size: 13px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <img
            class="logo"
            src="{{ url_for('static', filename='logo_crist_oss.png') }}"
            alt="Logo Crist Oss"
        >

        <h1>GRADUAÇÃO CRIST OSS BJJ</h1>

        <form action="/gerar" method="POST">

            <label>NOME COMPLETO DO ALUNO</label>
            <input
                type="text"
                name="nome"
                placeholder="EX: JOÃO SILVA SANTOS"
                required
            >

            <label>SEDE</label>
            <input
                type="text"
                name="sede"
                placeholder="DEIXE EM BRANCO PARA USAR O FUNDO PADRÃO"
            >

            <label>COR DA FAIXA</label>

            <input
                type="hidden"
                name="faixa"
                id="faixaInput"
                value="cinza/branca"
            >

            <div class="faixa-select">

                <div class="faixa-atual" onclick="abrirFaixas()">
                    <div id="faixaAtualCor" class="faixa-cor"></div>
                    <div id="faixaAtualDetalhe" class="faixa-detalhe"></div>
                    <div class="faixa-seta">▼</div>
                </div>

                <div id="faixaOpcoes" class="faixa-opcoes"></div>

            </div>

            <label>DATA DA GRADUAÇÃO</label>

            <div class="data">
                <select name="dia" required>
                    {% for dia in dias %}
                        <option value="{{ dia }}">{{ dia }}</option>
                    {% endfor %}
                </select>

                <select name="mes" required>
                    {% for mes in meses %}
                        <option value="{{ mes }}">{{ mes }}</option>
                    {% endfor %}
                </select>

                <select name="ano" required>
                    {% for ano in anos %}
                        <option value="{{ ano }}">{{ ano }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">
                GERAR CERTIFICADO
            </button>

        </form>

        <a
            class="botao-link botao-lote"
            href="{{ url_for('certificados_lote') }}"
        >
            CERTIFICADOS EM LOTE
        </a>

        <p class="info">
            O PDF SERÁ ABERTO COM OPÇÃO DE IMPRIMIR, BAIXAR E COMPARTILHAR.
        </p>

        <a class="sair" href="{{ url_for('menu') }}">
            VOLTAR AO MENU
        </a>

    </div>
</div>

<script>
const faixas = [
    "cinza/branca",
    "cinza",
    "cinza/preta",
    "amarela/branca",
    "amarela",
    "amarela/preta",
    "laranja/branca",
    "laranja",
    "laranja/preta",
    "verde/branca",
    "verde",
    "verde/preta",
    "azul",
    "roxa",
    "marrom",
    "preta"
];

const coresFaixa = {
    "cinza/branca": "#8f8f8f",
    "cinza": "#8f8f8f",
    "cinza/preta": "#8f8f8f",

    "amarela/branca": "#f1c40f",
    "amarela": "#f1c40f",
    "amarela/preta": "#f1c40f",

    "laranja/branca": "#e67e22",
    "laranja": "#e67e22",
    "laranja/preta": "#e67e22",

    "verde/branca": "#27ae60",
    "verde": "#27ae60",
    "verde/preta": "#27ae60",

    "azul": "#1f5fbf",
    "roxa": "#6c3483",
    "marrom": "#7b4a24",
    "preta": "#111111"
};

function corTarjaFinal(faixa) {
    if (faixa === "preta") {
        return "#c0392b";
    }

    return "#111111";
}

function corLinhaHorizontal(faixa) {
    if (faixa.includes("/branca")) {
        return "#ffffff";
    }

    if (faixa.includes("/preta")) {
        return "#111111";
    }

    return null;
}

function aplicarFaixa(elementoCor, elementoDetalhe, faixa) {
    elementoCor.style.background = coresFaixa[faixa];
    elementoDetalhe.style.background = corTarjaFinal(faixa);

    elementoCor.innerHTML = "";

    const linhaCor = corLinhaHorizontal(faixa);

    if (linhaCor) {
        const linha = document.createElement("div");
        linha.className = "linha-horizontal";
        linha.style.background = linhaCor;
        elementoCor.appendChild(linha);
    }
}

function montarOpcoes() {
    const opcoes = document.getElementById("faixaOpcoes");
    opcoes.innerHTML = "";

    faixas.forEach(faixa => {
        const item = document.createElement("div");
        item.className = "faixa-opcao";
        item.onclick = () => selecionarFaixa(faixa);

        const cor = document.createElement("div");
        cor.className = "faixa-opcao-cor";

        const detalhe = document.createElement("div");
        detalhe.className = "faixa-opcao-detalhe";

        aplicarFaixa(cor, detalhe, faixa);

        item.appendChild(cor);
        item.appendChild(detalhe);

        opcoes.appendChild(item);
    });
}

function selecionarFaixa(faixa) {
    document.getElementById("faixaInput").value = faixa;

    const faixaAtualCor = document.getElementById("faixaAtualCor");
    const faixaAtualDetalhe = document.getElementById("faixaAtualDetalhe");

    aplicarFaixa(faixaAtualCor, faixaAtualDetalhe, faixa);

    document.getElementById("faixaOpcoes").style.display = "none";
}

function abrirFaixas() {
    const opcoes = document.getElementById("faixaOpcoes");

    if (opcoes.style.display === "block") {
        opcoes.style.display = "none";
    } else {
        opcoes.style.display = "block";
    }
}

document.addEventListener("click", function(event) {
    const select = document.querySelector(".faixa-select");

    if (!select.contains(event.target)) {
        document.getElementById("faixaOpcoes").style.display = "none";
    }
});

montarOpcoes();
selecionarFaixa("cinza/branca");
</script>

</body>
</html>
