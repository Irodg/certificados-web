<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Certificado Gerado</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eeeeee;
    }

    .topo {
        background: #202020;
        color: white;
        padding: 18px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
    }

    button,
    a {
        border: none;
        padding: 14px 22px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        color: white;
        background: #444444;
    }

    button:hover,
    a:hover {
        background: #000000;
    }

    .voltar {
        background: #777777;
    }

    .pdf-area {
        width: 100%;
        height: calc(100vh - 80px);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }
</style>
</head>

<body>

{% set pdf_url = url_for('pdf', nome=nome, faixa=faixa, dia=dia, mes=mes, ano=ano) %}

<div class="topo">

    <button onclick="imprimirPDF()">
        Imprimir
    </button>

    <a href="{{ pdf_url }}" download>
        Baixar PDF
    </a>

    <button onclick="compartilharPDF()">
        Compartilhar PDF
    </button>

    <a class="voltar" href="{{ url_for('index') }}">
        Voltar
    </a>

</div>

<div class="pdf-area">
    <iframe id="pdfFrame" src="{{ pdf_url }}"></iframe>
</div>

<script>
    const pdfUrl = window.location.origin + "{{ pdf_url }}";

    function imprimirPDF() {
        const frame = document.getElementById("pdfFrame");
        frame.contentWindow.focus();
        frame.contentWindow.print();
    }

    async function compartilharPDF() {
        if (navigator.share) {
            await navigator.share({
                title: "Certificado",
                text: "Segue o certificado em PDF.",
                url: pdfUrl
            });
        } else {
            navigator.clipboard.writeText(pdfUrl);
            alert("Link do PDF copiado para a área de transferência.");
        }
    }
</script>

</body>
</html>
